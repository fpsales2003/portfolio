<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Home</title>
        <link rel="stylesheet" href="css/normalize.css">
        <link rel="stylesheet" href="css/styles.css">
        <link rel="shortcut icon" type="image/x-icon" href="../images/favicon.ico">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Anek+Devanagari:wght@300&display=swap" rel="stylesheet">
    </head>

    <body>
        <div class="header">
            <div class="menu-btn">
                <div class="menu-btn_burger" id="burgerBtn"></div>
            </div>
            <div class="overlay" id="menu">
                <nav class="nav-bar">
                    <ul>
                        <li>
                            <a href="index.html">Projects</a>
                        </li>
                        <li>
                            <a href="about.html">About</a>
                        </li>
                        <li>
                            <a href="contact.html">Contact</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>

        <div class="bodyText">
            <div class="headingText">
                <h1>Francis Sales</h1>
                <p>Web Design Student</p>
                <p>Westport, CT</p>
            </div>

            <div class="form">
                <h1 id="contactHeader">Contact Me</h1>
                <h2>Contact Form</h2>
                <form action="https://formspree.io/f/moqbdqbn" method="post">
                    <div class="name">
                        <label for="firstname"></label>
                        <input type="text" id="firstname" name="name" placeholder="First Name" required>
                        <label for="lastname"></label>
                        <input type="text" id="lastname" name="lastname" placeholder="Last Name" required> <br>
                    </div>
                    <div class="emailSub">
                        <label for="email"></label>
                        <input type="email" name="email" id="email" placeholder="Email" required> <br>
                        <label for="subject"></label>
                        <input type="text" name="subject" id="subject" placeholder="Subject" required>
                    </div>
                    <div class="message">
                        <label for="message"></label>
                        <textarea name="message" id ="message" placeholder="Say Something" required></textarea><br>
                    </div>
                    <input type="submit" value="submit form" id="formBtn">
                </form>
            </div>
        </div>

        <script src="https://code.jquery.com/jquery-3.6.3.js" integrity="sha256-nQLuAZGRRcILA+6dMBOvcRh5Pe310sBpanc6+QBmyVM=" crossorigin="anonymous"></script>
        <script src="js/main.js"></script>
    </body>
</html>
